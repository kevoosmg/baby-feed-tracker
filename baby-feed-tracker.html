<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="喂奶记录">
<title>宝宝喂奶记录</title>
<style>
  :root {
    --pink: #FF6B9D;
    --pink-light: #FFE0EC;
    --blue: #4FACFE;
    --blue-light: #E0F2FE;
    --green: #43E97B;
    --green-light: #D4F7E3;
    --orange: #FA8231;
    --orange-light: #FFF0E0;
    --warn: #FF4757;
    --warn-light: #FFE8EA;
    --text: #2D3436;
    --text-light: #636E72;
    --bg: #F8F9FA;
    --card: #FFFFFF;
    --radius: 18px;
    --shadow: 0 4px 20px rgba(0,0,0,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 90px;
  }

  .header {
    background: linear-gradient(135deg, #FF6B9D 0%, #FF8E53 100%);
    color: white;
    padding: 20px 20px 24px;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(255,107,157,0.3);
  }
  .header h1 { font-size: 20px; font-weight: 700; letter-spacing: 1px; }
  .header .date { font-size: 13px; opacity: 0.85; margin-top: 4px; }

  .section { padding: 16px 16px 0; }
  .section-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-light);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 10px;
  }

  /* Baby Cards */
  .baby-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .baby-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 16px 14px;
    box-shadow: var(--shadow);
    position: relative;
    overflow: hidden;
  }
  .baby-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    border-radius: var(--radius) var(--radius) 0 0;
  }
  .baby-card.big::before { background: linear-gradient(90deg, #FF6B9D, #FF8E53); }
  .baby-card.small::before { background: linear-gradient(90deg, #4FACFE, #00F2FE); }

  .baby-name {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 2px;
  }
  .baby-card.big .baby-name { color: #FF6B9D; }
  .baby-card.small .baby-name { color: #4FACFE; }

  .last-feed {
    font-size: 11px;
    color: var(--text-light);
    margin-bottom: 10px;
  }

  .timer-ring {
    width: 80px;
    height: 80px;
    margin: 0 auto 12px;
    position: relative;
  }
  .timer-ring svg {
    transform: rotate(-90deg);
    width: 80px;
    height: 80px;
  }
  .timer-ring .bg-circle {
    fill: none;
    stroke: #F0F0F0;
    stroke-width: 6;
  }
  .timer-ring .progress-circle {
    fill: none;
    stroke-width: 6;
    stroke-linecap: round;
    transition: stroke-dashoffset 1s linear, stroke 0.5s;
  }
  .baby-card.big .progress-circle { stroke: #FF6B9D; }
  .baby-card.small .progress-circle { stroke: #4FACFE; }
  .timer-ring .timer-text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    pointer-events: none;
  }
  .timer-ring .timer-hm {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    display: block;
  }
  .timer-ring .timer-label {
    font-size: 9px;
    color: var(--text-light);
    display: block;
  }

  .status-badge {
    display: inline-block;
    font-size: 10px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 20px;
    margin-bottom: 10px;
  }
  .status-ok { background: var(--green-light); color: #27AE60; }
  .status-soon { background: var(--orange-light); color: var(--orange); }
  .status-due { background: var(--warn-light); color: var(--warn); }
  .status-none { background: #F0F0F0; color: var(--text-light); }

  .btn-feed {
    width: 100%;
    border: none;
    border-radius: 12px;
    padding: 10px 0;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.1s;
    letter-spacing: 0.5px;
  }
  .btn-feed:active { transform: scale(0.96); opacity: 0.85; }
  .baby-card.big .btn-feed { background: linear-gradient(135deg, #FF6B9D, #FF8E53); color: white; }
  .baby-card.small .btn-feed { background: linear-gradient(135deg, #4FACFE, #00F2FE); color: white; }

  /* Vitamin Row */
  .vitamin-row {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .vitamin-item {
    display: flex;
    align-items: center;
    padding: 14px 16px;
    gap: 12px;
    cursor: pointer;
    transition: background 0.15s;
    position: relative;
  }
  .vitamin-item:active { background: #F8F9FA; }
  .vitamin-item + .vitamin-item::before {
    content: '';
    position: absolute;
    top: 0; left: 16px; right: 16px;
    height: 1px;
    background: #F0F0F0;
  }
  .vitamin-icon {
    width: 40px;
    height: 40px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }
  .vitamin-ad .vitamin-icon { background: #FFF3E0; }
  .vitamin-d3 .vitamin-icon { background: #E8F5E9; }
  .vitamin-info { flex: 1; }
  .vitamin-name { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
  .vitamin-desc { font-size: 11px; color: var(--text-light); }
  .vitamin-status {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
    white-space: nowrap;
  }
  .v-done { background: var(--green-light); color: #27AE60; }
  .v-due { background: var(--warn-light); color: var(--warn); }
  .v-skip { background: #F0F0F0; color: var(--text-light); }
  .v-tomorrow { background: var(--blue-light); color: var(--blue); }
  .v-today { background: var(--orange-light); color: var(--orange); }

  /* Today's Log */
  .log-card {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .log-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px 10px;
    border-bottom: 1px solid #F5F5F5;
  }
  .log-title { font-size: 15px; font-weight: 700; }

  .baby-stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px 14px; }
  .baby-stat-card {
    background: #FAFAFA;
    border-radius: 12px;
    padding: 10px 8px;
    text-align: center;
  }
  .baby-stat-card .stat-baby-name { font-size: 11px; font-weight: 700; margin-bottom: 4px; }
  .baby-stat-card.big .stat-baby-name { color: #FF6B9D; }
  .baby-stat-card.small .stat-baby-name { color: #4FACFE; }
  .baby-stat-card .stat-nums { font-size: 12px; color: var(--text-light); }
  .baby-stat-card .stat-nums strong { color: var(--text); font-size: 15px; }

  .log-list { padding: 8px 0; max-height: 260px; overflow-y: auto; }
  .log-entry {
    display: flex;
    align-items: center;
    padding: 9px 16px;
    gap: 10px;
    transition: background 0.1s;
  }
  .log-entry:hover { background: #FAFAFA; }
  .log-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .dot-big { background: #FF6B9D; }
  .dot-small { background: #4FACFE; }
  .dot-pee { background: #4FACFE; }
  .dot-poo { background: #8B4513; }
  .log-time { font-size: 12px; color: var(--text-light); width: 42px; flex-shrink: 0; }
  .log-who { font-size: 13px; font-weight: 600; width: 28px; flex-shrink: 0; }
  .log-amount { font-size: 13px; color: var(--text); flex: 1; }
  .log-note { font-size: 11px; color: var(--text-light); flex: 1; font-style: italic; }
  .log-diaper-type { font-size: 12px; color: var(--text-light); flex: 1; }
  .log-del {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: none;
    background: #FFF0F0;
    color: #FF4757;
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    line-height: 1;
  }
  .log-del:active { background: #FFD0D5; }

  .log-empty {
    text-align: center;
    padding: 24px 16px;
    color: var(--text-light);
    font-size: 13px;
  }

  /* Copy Button */
  .btn-copy {
    width: calc(100% - 32px);
    margin: 0 16px 16px;
    border: none;
    border-radius: 12px;
    padding: 13px 0;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    background: linear-gradient(135deg, #667EEA, #764BA2);
    color: white;
    letter-spacing: 0.5px;
    transition: transform 0.1s, opacity 0.1s;
  }
  .btn-copy:active { transform: scale(0.98); opacity: 0.85; }

  /* Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    backdrop-filter: blur(4px);
    z-index: 200;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
  }
  .modal-overlay.show {
    opacity: 1;
    pointer-events: all;
  }
  .modal {
    background: var(--card);
    border-radius: 24px 24px 0 0;
    padding: 24px 20px 40px;
    width: 100%;
    max-width: 480px;
    transform: translateY(30px);
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .modal-overlay.show .modal { transform: translateY(0); }
  .modal-handle {
    width: 40px;
    height: 4px;
    background: #DDD;
    border-radius: 2px;
    margin: 0 auto 20px;
  }
  .modal-title {
    font-size: 17px;
    font-weight: 700;
    margin-bottom: 20px;
    text-align: center;
  }

  .form-group { margin-bottom: 16px; }
  .form-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-light);
    margin-bottom: 6px;
    display: block;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .form-input {
    width: 100%;
    border: 2px solid #EEE;
    border-radius: 12px;
    padding: 12px 14px;
    font-size: 16px;
    outline: none;
    transition: border-color 0.2s;
    background: #FAFAFA;
    color: var(--text);
    font-family: inherit;
    -webkit-appearance: none;
  }
  .form-input:focus { border-color: var(--pink); background: white; }

  .amount-presets {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 6px;
  }
  .preset-btn {
    border: 2px solid #EEE;
    border-radius: 10px;
    padding: 9px 0;
    font-size: 13px;
    font-weight: 600;
    background: white;
    color: var(--text-light);
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }
  .preset-btn.active, .preset-btn:active {
    border-color: var(--pink);
    color: var(--pink);
    background: var(--pink-light);
  }

  /* Feed Type Tabs */
  .feed-type-tabs { display: flex; gap: 8px; margin-bottom: 12px; }
  .feed-type-tab {
    flex: 1;
    border: 2px solid #EEE;
    border-radius: 10px;
    padding: 8px 0;
    font-size: 13px;
    font-weight: 600;
    background: white;
    color: var(--text-light);
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }
  .feed-type-tab.active {
    border-color: var(--pink);
    color: var(--pink);
    background: var(--pink-light);
  }

  .modal-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
  .btn-cancel {
    border: 2px solid #EEE;
    border-radius: 12px;
    padding: 13px 0;
    font-size: 15px;
    font-weight: 600;
    background: white;
    color: var(--text-light);
    cursor: pointer;
  }
  .btn-confirm {
    border: none;
    border-radius: 12px;
    padding: 13px 0;
    font-size: 15px;
    font-weight: 700;
    background: linear-gradient(135deg, #FF6B9D, #FF8E53);
    color: white;
    cursor: pointer;
    transition: transform 0.1s;
  }
  .btn-confirm:active { transform: scale(0.97); }

  /* Diaper Button */
  .btn-diaper {
    width: 100%;
    border: none;
    border-radius: 12px;
    padding: 10px 0;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.1s;
    letter-spacing: 0.5px;
    margin-top: 8px;
    background: #F0F0F0;
    color: var(--text-light);
  }
  .btn-diaper:active { transform: scale(0.96); opacity: 0.85; }
  .baby-card.big .btn-diaper:hover { background: #FFE0EC; color: #FF6B9D; }
  .baby-card.small .btn-diaper:hover { background: #E0F2FE; color: #4FACFE; }

  /* Diaper Modal */
  .diaper-type-tabs { display: flex; gap: 10px; margin-bottom: 16px; }
  .diaper-type-tab {
    flex: 1;
    border: 2px solid #EEE;
    border-radius: 12px;
    padding: 16px 0;
    font-size: 15px;
    font-weight: 700;
    background: white;
    color: var(--text-light);
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }
  .diaper-type-tab.active-pee { border-color: #4FACFE; color: #4FACFE; background: #E0F2FE; }
  .diaper-type-tab.active-poo { border-color: #8B4513; color: #8B4513; background: #FFF8E1; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(45,52,54,0.92);
    color: white;
    padding: 10px 22px;
    border-radius: 30px;
    font-size: 14px;
    font-weight: 500;
    z-index: 300;
    opacity: 0;
    transition: all 0.3s;
    white-space: nowrap;
    pointer-events: none;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* Celebration Overlay */
  .celebration-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: 999;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    background: rgba(0,0,0,0.01);
    opacity: 0;
    animation: celeFade 2.8s ease forwards;
    will-change: opacity;
  }
  .celebration-text {
    font-size: 26px;
    font-weight: 700;
    color: #FF6B9D;
    text-shadow: 0 2px 16px rgba(255,107,157,0.35);
    animation: celeText 2.8s ease forwards;
    z-index: 2;
    position: relative;
  }
  .heart-particle {
    position: absolute;
    opacity: 0;
    z-index: 1;
    animation: heartBurst 2.8s ease forwards;
  }
  @keyframes celeFade {
    0% { opacity: 0; }
    8% { opacity: 1; }
    75% { opacity: 1; }
    100% { opacity: 0; }
  }
  @keyframes celeText {
    0% { opacity: 0; transform: scale(0.4); }
    12% { opacity: 1; transform: scale(1.12); }
    28% { transform: scale(1); }
    75% { opacity: 1; }
    100% { opacity: 0; transform: scale(0.88); }
  }
  @keyframes heartBurst {
    0% { opacity: 0; transform: translate(0,0) scale(0.2) rotate(0deg); }
    8% { opacity: 1; }
    65% { opacity: 1; }
    100% { opacity: 0; transform: translate(var(--hx), var(--hy)) scale(1.1) rotate(var(--hr)); }
  }

  /* Tab Bar */
  .tab-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: white;
    border-top: 1px solid #F0F0F0;
    display: grid;
    grid-template-columns: 1fr 1fr;
    height: 80px;
    padding-bottom: env(safe-area-inset-bottom);
    z-index: 150;
    box-shadow: 0 -4px 20px rgba(0,0,0,0.06);
  }
  .tab-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    cursor: pointer;
    transition: all 0.15s;
    padding: 8px;
  }
  .tab-item .tab-icon { font-size: 24px; line-height: 1; }
  .tab-item .tab-label { font-size: 11px; font-weight: 600; color: var(--text-light); }
  .tab-item.active .tab-label { color: var(--pink); }

  /* Page */
  .page { display: none; }
  .page.active { display: block; }

  /* History Page */
  .day-group { margin-bottom: 16px; }
  .day-label {
    font-size: 12px;
    font-weight: 700;
    color: var(--text-light);
    padding: 0 4px 8px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
    /* Calendar Icon for History Date */
    .day-calendar {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      width: 48px;
      margin-right: 12px;
      flex-shrink: 0;
    }
    .day-calendar-month {
      background: var(--pink);
      color: white;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      width: 100%;
      text-align: center;
      padding: 3px 0 2px;
      border-radius: 6px 6px 0 0;
    }
    .day-calendar-day {
      background: white;
      color: var(--text);
      font-size: 20px;
      font-weight: 700;
      width: 100%;
      text-align: center;
      padding: 4px 0 6px;
      border: 2px solid var(--pink);
      border-top: none;
      border-radius: 0 0 6px 6px;
      line-height: 1;
    }
    .day-label-row {
      display: flex;
      align-items: center;
      gap: 0;
    }
    .day-label-text {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
    }
    .day-label-text .today-badge {
      display: inline-block;
      background: var(--pink);
      color: white;
      font-size: 11px;
      padding: 1px 8px;
      border-radius: 10px;
      margin-right: 6px;
      font-weight: 600;
    }

  .history-baby-stats { display: flex; gap: 10px; padding: 4px 0 8px; flex-wrap: wrap; }
  .history-baby-stat {
    font-size: 12px;
    color: var(--text-light);
    padding: 3px 8px;
    background: #F8F9FA;
    border-radius: 6px;
  }
  .history-baby-stat strong { color: var(--text); }

  /* Vitamin confirm modal adjustments */
  .vitamin-confirm-info {
    background: var(--bg);
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 16px;
    font-size: 14px;
    color: var(--text-light);
    line-height: 1.6;
  }
  .vitamin-confirm-info strong { color: var(--text); }

  /* Ring warning pulse */
  @keyframes pulse-ring {
    0% { transform: rotate(-90deg) scale(1); }
    50% { transform: rotate(-90deg) scale(1.03); }
    100% { transform: rotate(-90deg) scale(1); }
  }
  .pulse svg { animation: pulse-ring 1.2s ease-in-out infinite; }

  /* Scrollbar */
  .log-list::-webkit-scrollbar { width: 3px; }
  .log-list::-webkit-scrollbar-thumb { background: #DDD; border-radius: 2px; }
  .feed-type-tab.active-direct {
    background: #FFF8E1;
    color: #F57F17;
    border-bottom: 3px solid #F9A825;
  }
  </style>
</head>
<body>

<div class="header">
  <h1>🍼 宝宝喂奶记录</h1>
  <div class="date" id="headerDate"></div>
</div>

<!-- Tab Pages -->
<div id="page-home" class="page active">

  <div class="section" style="margin-top:16px;">
    <div class="section-title">喂奶计时</div>
    <div class="baby-grid">
      <!-- 大宝 -->
      <div class="baby-card big" id="card-big">
        <div class="baby-name">👶 大宝</div>
        <div class="last-feed" id="lastFeed-big">尚未记录</div>
        <div class="timer-ring" id="ring-big">
          <svg viewBox="0 0 80 80">
            <circle class="bg-circle" cx="40" cy="40" r="34"/>
            <circle class="progress-circle" id="progress-big" cx="40" cy="40" r="34"
              stroke-dasharray="213.6" stroke-dashoffset="213.6"/>
          </svg>
          <div class="timer-text">
            <span class="timer-hm" id="timerHM-big">--:--</span>
            <span class="timer-label" id="timerLabel-big">距上次</span>
          </div>
        </div>
        <div style="text-align:center;margin-bottom:10px;">
          <span class="status-badge status-none" id="status-big">未开始</span>
        </div>
        <button class="btn-feed" onclick="openFeedModal('big')">记录喂奶</button>
        <button class="btn-diaper" onclick="openDiaperModal('big')">🧷 换尿布</button>
      </div>

      <!-- 小宝 -->

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
const sc = createClient('https://xfkixutmglsbxlimkbtn.supabase.co', 'sb_publishable_8kzHQn4rDaaQ-2gLN91hcA_9_0bvRWN');
window.__sb = sc;
window.dispatchEvent(new Event('sb-ready'));
</script>
<script>
// ========== DATA LAYER ==========
const INTERVAL_MS = 2.5 * 60 * 60 * 1000; // 2.5 hours

// In-memory cache
let cachedRecords = {};
let cachedDiaper = {};
let cachedLastFeed = {};
let cachedVitamin = {};

function sb() { return window.__sb; }

function todayKey() {
  // 强制用中国时区，不受浏览器时区影响
  const now = new Date();
  const f = new Intl.DateTimeFormat('en-CA', { timeZone: 'Asia/Shanghai', year: 'numeric', month: '2-digit', day: '2-digit' });
  return f.format(now);
}

function loadFromCache() {
  try {
    const c = JSON.parse(localStorage.getItem('babyFeed_cache') || '{}');
    cachedRecords = c.records || {};
    cachedDiaper = c.diaper || {};
    cachedLastFeed = c.lastFeed || {};
    cachedVitamin = c.vitamin || {};
  } catch(e) { cachedRecords = {}; cachedDiaper = {}; cachedLastFeed = {}; cachedVitamin = {}; }
}

async function loadAllData() {
  const client = sb();
  if (!client) { loadFromCache(); return; }
  try {
    // Load feed records
    const { data: feeds } = await client.from('feed_records').select('*').order('time', { ascending: true });
    cachedRecords = {};
    const lf = {};
    if (feeds) {
      feeds.forEach(r => {
        const d = new Date(r.time);
        const dk = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        if (!cachedRecords[dk]) cachedRecords[dk] = [];
        cachedRecords[dk].push({
          id: r.id,
          baby: r.baby,
          time: new Date(r.time).getTime(),
          amount: r.amount,
          feed_type: r.feed_type || 'formula',
          note: r.note || ''
        });
        if (r.feed_type !== 'direct') {
          lf[r.baby] = Math.max(lf[r.baby] || 0, new Date(r.time).getTime());
        }
      });
    }
    cachedLastFeed = lf;

    // Load diaper records
    const { data: diapers } = await client.from('diaper_records').select('*').order('time', { ascending: true });
    cachedDiaper = {};
    if (diapers) {
      diapers.forEach(r => {
        const d = new Date(r.time);
        const dk = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        if (!cachedDiaper[dk]) cachedDiaper[dk] = [];
        cachedDiaper[dk].push({
          id: r.id,
          baby: r.baby,
          type: r.type,
          time: new Date(r.time).getTime()
        });
      });
    }

    // Load vitamin records — merge, never reset (to avoid race with realtime)
    const { data: vits } = await client.from('vitamin_records').select('*');
    const serverVitaminTypes = new Set();
    if (vits) {
      vits.forEach(v => {
        cachedVitamin[v.type] = v.date_key;
        serverVitaminTypes.add(v.type);
      });
    }
    // Remove cached types not present on server (deleted elsewhere)
    Object.keys(cachedVitamin).forEach(k => {
      if (!serverVitaminTypes.has(k)) delete cachedVitamin[k];
    });

    localStorage.setItem('babyFeed_cache', JSON.stringify({
      records: cachedRecords, diaper: cachedDiaper, lastFeed: cachedLastFeed, vitamin: cachedVitamin
    }));
  } catch(e) {
    console.warn('Supabase load failed, using cache', e);
    loadFromCache();
  }
}

function setupRealtime() {
  const client = sb();
  if (!client) return;
  client.channel('feed-sync')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'feed_records' }, () => {
      loadAllData().then(refreshAll);
    })
    .on('postgres_changes', { event: '*', schema: 'public', table: 'vitamin_records' }, () => {
      loadAllData().then(refreshAll);
    })
    .on('postgres_changes', { event: '*', schema: 'public', table: 'diaper_records' }, () => {
      loadAllData().then(refreshAll);
    })
    .subscribe();
}

function refreshAll() {
  updateTimer('big');
  updateTimer('small');
  updateVitaminUI();
  renderTodayLog();
}

function getRecords(dateKey) {
  return cachedRecords[dateKey] || [];
}

function getDiaper(dateKey) {
  return cachedDiaper[dateKey] || [];
}

async function saveRecord(dateKey, record) {
  const client = sb();
  if (!client) { showToast('连接未就绪，请刷新重试'); return; }
  const { data, error } = await client.from('feed_records').insert({
    baby: record.baby,
    time: new Date(record.time).toISOString(),
    amount: record.amount,
    feed_type: record.feed_type || 'formula',
    note: record.note || ''
  }).select();
  if (error) { showToast('保存失败: ' + error.message); return; }
  if (data && data[0]) {
    if (!cachedRecords[dateKey]) cachedRecords[dateKey] = [];
    cachedRecords[dateKey].push({
      id: data[0].id,
      baby: record.baby,
      time: record.time,
      amount: record.amount,
      feed_type: record.feed_type || 'formula',
      note: record.note || ''
    });
    cachedRecords[dateKey].sort((a, b) => a.time - b.time);
    if (record.feed_type !== 'direct') {
      cachedLastFeed[record.baby] = record.time;
    }
  }
}

async function deleteRecord(dateKey, idx) {
  const rec = cachedRecords[dateKey]?.[idx];
  if (!rec || !rec.id) { showToast('无法删除'); return false; }
  const client = sb();
  if (!client) { showToast('连接未就绪'); return false; }
  const { error } = await client.from('feed_records').delete().eq('id', rec.id);
  if (error) { showToast('删除失败: ' + error.message); return false; }
  cachedRecords[dateKey].splice(idx, 1);
  return true;
}

async function saveDiaperRecord(dateKey, record) {
  const client = sb();
  if (!client) { showToast('连接未就绪'); return; }
  const { data, error } = await client.from('diaper_records').insert({
    baby: record.baby,
    type: record.type,
    time: new Date(record.time).toISOString()
  }).select();
  if (error) { showToast('保存失败: ' + error.message); return; }
  if (data && data[0]) {
    if (!cachedDiaper[dateKey]) cachedDiaper[dateKey] = [];
    cachedDiaper[dateKey].push({
      id: data[0].id,
      baby: record.baby,
      type: record.type,
      time: record.time
    });
  }
}

async function deleteDiaperRecord(dateKey, idx) {
  const rec = cachedDiaper[dateKey]?.[idx];
  if (!rec || !rec.id) { showToast('无法删除'); return false; }
  const client = sb();
  if (!client) { showToast('连接未就绪'); return false; }
  const { error } = await client.from('diaper_records').delete().eq('id', rec.id);
  if (error) { showToast('删除失败: ' + error.message); return false; }
  cachedDiaper[dateKey].splice(idx, 1);
  return true;
}

function getLastFeed(baby) {
  return cachedLastFeed[baby] || null;
}

function setLastFeed(baby, ts) {
  cachedLastFeed[baby] = ts;
}

function getVitamin() {
  return cachedVitamin;
}

async function setVitamin(type, dateKey) {
  const client = sb();
  if (!client) { showToast('连接未就绪'); return; }
  // Delete existing record with same type first (ignore if not found)
  const { error: delErr } = await client.from('vitamin_records').delete().eq('type', type);
  // insert the new record
  const { error } = await client.from('vitamin_records').insert({ type, date_key: dateKey });
  if (error) { showToast('记录失败: ' + error.message); return; }
  cachedVitamin[type] = dateKey;
}

async function deleteVitamin(type) {
  // Clear cache immediately to prevent realtime sync race
  delete cachedVitamin[type];
  const client = sb();
  if (!client) { showToast('连接未就绪'); return; }
  const { error } = await client.from('vitamin_records').delete().eq('type', type);
  if (error) { showToast('撤销失败: ' + error.message); return; }
  delete cachedVitamin[type];
}

// ========== UI HELPERS ==========
function fmtTime(ts) {
  const d = new Date(ts);
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
function fmtDateTime(ts) {
  const d = new Date(ts);
  return `${d.getMonth()+1}/${d.getDate()} ${fmtTime(ts)}`;
}
function fmtDuration(ms) {
  if (ms < 0) ms = 0;
  const h = Math.floor(ms / 3600000);
  const m = Math.floor((ms % 3600000) / 60000);
  if (h > 0) return `${h}h${String(m).padStart(2,'0')}m`;
  return `${m}m`;
}
function toLocalDatetimeValue(ts) {
  const d = new Date(ts);
  const pad = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function showToast(msg, duration=2000) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), duration);
}

// ========== TIMER ==========
function updateTimer(baby) {
  const last = getLastFeed(baby);
  const progEl = document.getElementById(`progress-${baby}`);
  const hmEl = document.getElementById(`timerHM-${baby}`);
  const labelEl = document.getElementById(`timerLabel-${baby}`);
  const statusEl = document.getElementById(`status-${baby}`);
  const lastFeedEl = document.getElementById(`lastFeed-${baby}`);
  const ringEl = document.getElementById(`ring-${baby}`);
  const circumference = 213.6;

  if (!last) {
    progEl.style.strokeDashoffset = circumference;
    hmEl.textContent = '--:--';
    labelEl.textContent = '距上次';
    statusEl.className = 'status-badge status-none';
    statusEl.textContent = '未开始';
    lastFeedEl.textContent = '尚未记录';
    return;
  }

  const now = Date.now();
  const elapsed = now - last;
  const remaining = INTERVAL_MS - elapsed;
  const progress = Math.min(elapsed / INTERVAL_MS, 1);

  // Ring progress (fills as time passes)
  const offset = circumference * (1 - progress);
  progEl.style.strokeDashoffset = offset;

  lastFeedEl.textContent = `上次: ${fmtTime(last)}`;

  if (remaining > 0) {
    const remH = Math.floor(remaining / 3600000);
    const remM = Math.floor((remaining % 3600000) / 60000);
    const remS = Math.floor((remaining % 60000) / 1000);
    if (remH > 0) {
      hmEl.textContent = `${remH}:${String(remM).padStart(2,'0')}`;
      labelEl.textContent = '剩余';
    } else {
      hmEl.textContent = `${remM}:${String(remS).padStart(2,'0')}`;
      labelEl.textContent = '剩余';
    }

    if (remaining > 30 * 60000) {
      statusEl.className = 'status-badge status-ok';
      statusEl.textContent = '😴 睡得香';
      ringEl.classList.remove('pulse');
    } else {
      statusEl.className = 'status-badge status-soon';
      statusEl.textContent = '🍼 快了';
      ringEl.classList.remove('pulse');
    }
  } else {
    const overdue = Math.abs(remaining);
    const oH = Math.floor(overdue / 3600000);
    const oM = Math.floor((overdue % 3600000) / 60000);
    if (oH > 0) {
      hmEl.textContent = `+${oH}h${String(oM).padStart(2,'0')}`;
    } else {
      hmEl.textContent = `+${oM}m`;
    }
    labelEl.textContent = '超时';
    statusEl.className = 'status-badge status-due';
    statusEl.textContent = '🔴 该喂了！';
    ringEl.classList.add('pulse');
    progEl.style.stroke = '#FF4757';
  }
}

// ========== VITAMIN ==========
function getVitaminStatus(type) {
  // type 形如 'ad_big', 'ad_small', 'd3_big', 'd3_small'
  const v = getVitamin();
  const today = todayKey();
  const baseType = type.startsWith('ad') ? 'ad' : 'd3';

  if (baseType === 'ad') {
    if (v[type] === today) return 'done';
    return 'due';
  }

  if (baseType === 'd3') {
    if (v[type] === today) return 'done';
    if (!v[type]) return 'due';
    const [ty, tm, td] = today.split('-').map(Number);
    let y = ty, m = tm, d = td - 1;
    if (d < 1) {
      m = m - 1;
      if (m < 1) { m = 12; y = y - 1; }
      d = new Date(y, m, 0).getDate();
    }
    const yesterdayKey = `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    if (v[type] === yesterdayKey) return 'tomorrow';
    return 'due';
  }
}

function updateVitaminUI() {
  const types = ['ad_big','ad_small','d3_big','d3_small'];
  function applyStatus(el, status) {
    if (!el) return;
    el.className = 'vitamin-status';
    if (status === 'done')     { el.className += ' v-done';     el.textContent = '✓ 已服用'; }
    else if (status === 'due') { el.className += ' v-due';      el.textContent = '⚡ 待服用'; }
    else if (status === 'tomorrow') { el.className += ' v-tomorrow'; el.textContent = '明天服用'; }
    else                       { el.className += ' v-skip';     el.textContent = '今日跳过'; }
  }
  types.forEach(t => {
    applyStatus(document.getElementById(`vStatus-${t}`), getVitaminStatus(t));
  });
}

let currentVitaminType = null;
function handleVitamin(baseType, baby) {
  // type = 'ad_big' / 'ad_small' / 'd3_big' / 'd3_small'
  const type = `${baseType}_${baby}`;
  const status = getVitaminStatus(type);
  currentVitaminType = type;

  const titleEl = document.getElementById('vitaminModalTitle');
  const infoEl = document.getElementById('vitaminInfo');
  const undoBtn = document.getElementById('vitaminUndoBtn');
  const confirmBtn = document.getElementById('vitaminConfirmBtn');
  const babyName = baby === 'big' ? '大宝' : '小宝';
  const vitName = baseType === 'ad' ? '维生素 AD' : '维生素 D3';

  titleEl.textContent = `记录 ${vitName} · ${babyName}`;

  if (status === 'done') {
    infoEl.innerHTML = `<strong>${vitName}</strong> · ${babyName}<br>今天已记录，可以撤销`;
    undoBtn.style.display = '';
    confirmBtn.style.display = 'none';
  } else if (status === 'tomorrow') {
    const v = getVitamin();
    infoEl.innerHTML = `<strong>${vitName}</strong> · ${babyName}<br>隔天一粒，上次 ${v[type]}，今天跳过`;
    undoBtn.style.display = 'none';
    confirmBtn.style.display = '';
    confirmBtn.textContent = '仍然记录';
  } else {
    if (baseType === 'ad') {
      infoEl.innerHTML = `<strong>${vitName}</strong> · ${babyName}<br>每天早餐后第一次喂奶后服用一粒`;
    } else {
      const v = getVitamin();
      const lastKey = v[type] ? `上次服用：${v[type]}` : '首次记录';
      infoEl.innerHTML = `<strong>${vitName}</strong> · ${babyName}<br>隔天一粒 · ${lastKey}`;
    }
    undoBtn.style.display = 'none';
    confirmBtn.style.display = '';
    confirmBtn.textContent = '已服用 ✓';
  }

  document.getElementById('vitaminModal').classList.add('show');
}
function closeVitaminModal() {
  document.getElementById('vitaminModal').classList.remove('show');
  currentVitaminType = null;
}
async function confirmVitamin() {
  if (!currentVitaminType) return;
  await setVitamin(currentVitaminType, todayKey());
  updateVitaminUI();
  closeVitaminModal();
  const isAd = currentVitaminType.startsWith('ad');
  const isBig = currentVitaminType.endsWith('big');
  showToast(`${isAd ? '维生素AD' : '维生素D3'} · ${isBig ? '大宝' : '小宝'} 已记录 ✓`);
}
async function undoVitamin() {
  if (!currentVitaminType) return;
  await deleteVitamin(currentVitaminType);
  updateVitaminUI();
  closeVitaminModal();
  const isAd = currentVitaminType.startsWith('ad');
  const isBig = currentVitaminType.endsWith('big');
  showToast(`${isAd ? '维生素AD' : '维生素D3'} · ${isBig ? '大宝' : '小宝'} 已撤销`);
}

// ========== CELEBRATION ==========
function showCelebration() {
  const overlay = document.createElement('div');
  overlay.className = 'celebration-overlay';

  const text = document.createElement('div');
  text.className = 'celebration-text';
  text.textContent = '辛苦啦麻麻 \uD83D\uDC95';
  overlay.appendChild(text);

  const hearts = ['\uD83D\uDC95','\u2764\uFE0F','\uD83D\uDC97','\uD83D\uDC96','\uD83D\uDC9D','\uD83C\uDFB7','\u2665\uFE0F','\uD83D\uDC93','\uD83D\uDC92','\uD83C\uDFB5','\uD83C\uDFB6','\uD83D\uDC9E'];
  for (let i = 0; i < 20; i++) {
    const heart = document.createElement('div');
    heart.className = 'heart-particle';
    heart.textContent = hearts[i % hearts.length];
    heart.style.left = '50%';
    heart.style.top = '50%';
    const angle = (i / 20) * Math.PI * 2 + (Math.random() - 0.5) * 0.6;
    const dist = 90 + Math.random() * 130;
    heart.style.setProperty('--hx', Math.cos(angle) * dist + 'px');
    heart.style.setProperty('--hy', Math.sin(angle) * dist + 'px');
    heart.style.setProperty('--hr', Math.random() * 360 + 'deg');
    heart.style.animationDelay = Math.random() * 0.35 + 's';
    heart.style.fontSize = (16 + Math.random() * 14) + 'px';
    overlay.appendChild(heart);
  }

  document.body.appendChild(overlay);
  setTimeout(function() { if (overlay.parentNode) overlay.remove(); }, 3200);
}

// ========== FEED MODAL ==========
let currentFeedBaby = null;
let currentFeedType = 'formula';

function openFeedModal(baby) {
  currentFeedBaby = baby;
  currentFeedType = 'formula';
  const name = baby === 'big' ? '大宝' : '小宝';
  document.getElementById('feedModalTitle').textContent = `🍼 记录${name}喂奶`;
  document.getElementById('feedAmount').value = '';
  document.getElementById('feedNote').value = '';
  document.getElementById('feedTime').value = toLocalDatetimeValue(Date.now());
  // Reset preset buttons
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  // Reset feed type tabs
  document.getElementById('tab-formula').classList.add('active');
  document.getElementById('tab-breast').classList.remove('active');
  const tabDirect = document.getElementById('tab-direct');
  if (tabDirect) tabDirect.classList.remove('active');
  // Show amount group
  const amountGroup = document.getElementById('amountGroup');
  if (amountGroup) amountGroup.style.display = '';
  document.getElementById('feedModal').classList.add('show');
}
function closeFeedModal() {
  document.getElementById('feedModal').classList.remove('show');
  currentFeedBaby = null;
}
function selectPreset(btn, val) {
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('feedAmount').value = val;
}
function selectFeedType(btn, type) {
  currentFeedType = type;
  ['tab-formula','tab-breast','tab-direct'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.classList.remove('active');
  });
  btn.classList.add('active');
  const amountGroup = document.getElementById('amountGroup');
  if (amountGroup) amountGroup.style.display = type === 'direct' ? 'none' : '';
}
async function confirmFeed() {
  const amountRaw = document.getElementById('feedAmount').value;
  const timeRaw = document.getElementById('feedTime').value;
  const note = document.getElementById('feedNote').value.trim();
  const amount = parseInt(amountRaw);

  if (currentFeedType !== 'direct') {
    if (!amountRaw || isNaN(amount) || amount <= 0) {
      showToast('请输入喂奶量'); return;
    }
  }
  if (!timeRaw) {
    showToast('请选择时间'); return;
  }

  const ts = new Date(timeRaw).getTime();
  const recordDate = new Date(ts);
  const recordDateKey = `${recordDate.getFullYear()}-${String(recordDate.getMonth()+1).padStart(2,'0')}-${String(recordDate.getDate()).padStart(2,'0')}`;

  const record = {
    baby: currentFeedBaby,
    time: ts,
    amount: currentFeedType === 'direct' ? 0 : amount,
    feed_type: currentFeedType,
    note: note
  };

  await saveRecord(recordDateKey, record);
  if (currentFeedType !== 'direct') {
    setLastFeed(currentFeedBaby, ts);
  }

  closeFeedModal();
  if (currentFeedType !== 'direct') {
    updateTimer(currentFeedBaby);
  }
  try { renderTodayLog(); } catch(e) {}

  const name = currentFeedBaby === 'big' ? '大宝' : '小宝';
  const typeLabel = currentFeedType === 'formula' ? '奶粉' : (currentFeedType === 'breast' ? '母乳' : '亲喂');
  const amountText = currentFeedType === 'direct' ? '' : `${amount}ml `;
  showToast(`${name} ${typeLabel} ${amountText}✓`);

  try { showCelebration(); } catch(e) { console.warn('celebration error', e); }

  if (Notification.permission === 'default') {
    Notification.requestPermission();
  }
}

// ========== DIAPER MODAL ==========
let currentDiaperBaby = null;
let currentDiaperType = 'pee';

function openDiaperModal(baby) {
  currentDiaperBaby = baby;
  currentDiaperType = 'pee';
  const name = baby === 'big' ? '大宝' : '小宝';

  document.getElementById('tab-pee').classList.add('active-pee');
  document.getElementById('tab-pee').classList.remove('active-poo');
  document.getElementById('tab-poo').classList.remove('active-pee');

function closeDiaperModal() {

}
function selectDiaperType(btn, type) {

  document.getElementById('tab-pee').classList.remove('active-pee', 'active-poo');
  document.getElementById('tab-poo').classList.remove('active-pee', 'active-poo');

}
async function confirmDiaper() {
  if (!currentDiaperBaby) return;
  const timeRaw = document.getElementById('diaperTime').value;
  if (!timeRaw) { showToast('请选择时间'); return; }
  const ts = new Date(timeRaw).getTime();
  const recordDate = new Date(ts);
  const recordDateKey = `${recordDate.getFullYear()}-${String(recordDate.getMonth()+1).padStart(2,'0')}-${String(recordDate.getDate()).padStart(2,'0')}`;

  const record = {
    baby: currentDiaperBaby,
    type: currentDiaperType,
    time: ts
  };

  const typeLabel = currentDiaperType === 'pee' ? '小便' : '大便';

  try { showCelebration(); } catch(e) { console.warn('celebration error', e); }
}

// ========== LOG RENDER ==========
function renderTodayLog() {
  const today = todayKey();
  const records = getRecords(today);
  const diapers = getDiaper(today);
  const container = document.getElementById('todayLog');

  // Update baby stats
  renderBabyStats(today);

  // Merge feed and diaper records, sort by time
  const allEntries = [];

  records.forEach((r, i) => {
    allEntries.push({ type: 'feed', data: r, idx: i });
  });
  diapers.forEach((d, i) => {
    allEntries.push({ type: 'diaper', data: d, idx: i });
  });

  allEntries.sort((a, b) => a.data.time - b.data.time);

  if (allEntries.length === 0) {
    container.innerHTML = '<div class="log-empty">今天还没有记录<br>喂完第一顿点击"记录喂奶"📝</div>';
    return;
  }

  container.innerHTML = allEntries.map(entry => {
      if (entry.type === 'feed') {
        const r = entry.data;
        const dotClass = r.baby === 'big' ? 'dot-big' : 'dot-small';
        const who = r.baby === 'big' ? '大宝' : '小宝';
        const isDirect = r.feed_type === 'direct';
        const typeLabel = r.feed_type === 'breast' ? '[母乳]' : '';
        const noteStr = r.note ? ` (${r.note})` : '';
        const typeStr = typeLabel ? ` ${typeLabel}` : '';
        const amountDisplay = isDirect ? '亲喂' : `${r.amount}ml${typeStr}`;
        return `
        <div class="log-entry">
          <div class="log-dot ${dotClass}"></div>
          <div class="log-time">${fmtTime(r.time)}</div>
          <div class="log-who">${who}</div>
          <div class="log-amount">${amountDisplay}${noteStr}</div>
          <button class="log-del" onclick="delFeedRecord('${today}',${entry.idx})" title="删除">×</button>
        </div>`;
      } else {
      const d = entry.data;
      const dotClass = d.type === 'pee' ? 'dot-pee' : 'dot-poo';
      const who = d.baby === 'big' ? '大宝' : '小宝';
      const typeLabel = d.type === 'pee' ? '小便' : '大便';
      return `
      <div class="log-entry">
        <div class="log-dot ${dotClass}"></div>
        <div class="log-time">${fmtTime(d.time)}</div>
        <div class="log-who">${who}</div>
        <div class="log-diaper-type">🧷 ${typeLabel}</div>
        <button class="log-del" onclick="delDiaperRecord('${today}',${entry.idx})" title="删除">×</button>
      </div>`;
    }
  }).join('');
}

function renderBabyStats(dateKey) {
  const records = getRecords(dateKey);
  const container = document.getElementById('babyStatsRow');

  const bigRecs = records.filter(r => r.baby === 'big');
  const smallRecs = records.filter(r => r.baby === 'small');

  const bigCount = bigRecs.length;
  const bigTotal = bigRecs.reduce((s, r) => s + r.amount, 0);
  const smallCount = smallRecs.length;
  const smallTotal = smallRecs.reduce((s, r) => s + r.amount, 0);

  container.innerHTML = `
    <div class="baby-stat-card big">
      <div class="stat-baby-name">👶 大宝</div>
      <div class="stat-nums"><strong>${bigCount}</strong> 次 · <strong>${bigTotal}</strong> ml</div>
    </div>
    <div class="baby-stat-card small">
      <div class="stat-baby-name">🐣 小宝</div>
      <div class="stat-nums"><strong>${smallCount}</strong> 次 · <strong>${smallTotal}</strong> ml</div>
    </div>
  `;
}

async function delFeedRecord(dateKey, idx) {
  if (!confirm('确认删除这条喂奶记录？')) return;
  const ok = await deleteRecord(dateKey, idx);
  if (ok === false) return;

  // Recalculate last feed for each baby (exclude direct feeds)
  const allRecords = Object.values(cachedRecords).flat().sort((a, b) => b.time - a.time);
  cachedLastFeed = {};
  ['big', 'small'].forEach(baby => {
    const found = allRecords.find(r => r.baby === baby && r.feed_type !== 'direct');
    if (found) cachedLastFeed[baby] = found.time;
  });

  renderTodayLog();
  updateTimer('big');
  updateTimer('small');
  showToast('已删除');
}

async function delDiaperRecord(dateKey, idx) {
  if (!confirm('确认删除这条尿布记录？')) return;
  const ok = await deleteDiaperRecord(dateKey, idx);
  if (ok === false) return;

  renderTodayLog();
  showToast('已删除');
}

// ========== COPY ==========
function copyToClipboard() {
  const today = todayKey();
  const records = getRecords(today);
  const diapers = getDiaper(today);
  const vitamin = getVitamin();

  const d = new Date();
  const dateStr = `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;
  const weekdays = ['日','一','二','三','四','五','六'];
  const weekStr = `周${weekdays[d.getDay()]}`;

  let lines = [];
  lines.push(`🍼 ${dateStr}（${weekStr}）喂奶记录`);
  lines.push('═════════════════');

  if (records.length === 0 && diapers.length === 0) {
    lines.push('今日暂无记录');
  } else {
    let bigCount = 0, bigTotal = 0;
    let smallCount = 0, smallTotal = 0;

    records.forEach((r, i) => {
      const who = r.baby === 'big' ? '大宝' : '小宝';
      const isDirect = r.feed_type === 'direct';
      const typeLabel = r.feed_type === 'breast' ? '[母乳]' : '';
      const noteStr = r.note ? ` (${r.note})` : '';
      const typeStr = typeLabel ? ` ${typeLabel}` : '';
      const amountStr = isDirect ? '亲喂' : `${r.amount}ml${typeStr}`;
      lines.push(`${String(i+1).padStart(2,'0')}. ${fmtTime(r.time)} ${who} ${amountStr}${noteStr}`);
      if (r.baby === 'big') { bigCount++; bigTotal += r.amount; }
      else { smallCount++; smallTotal += r.amount; }
    });

    if (diapers.length > 0) {
      lines.push('───────────────────');
      lines.push('🧷 尿布记录：');
      diapers.forEach(d => {
        const who = d.baby === 'big' ? '大宝' : '小宝';
        const typeLabel = d.type === 'pee' ? '小便' : '大便';
        lines.push(`  ${fmtTime(d.time)} ${who} ${typeLabel}`);
      });
    }

    lines.push('───────────────────');
    lines.push(`大宝：${bigCount}次 共${bigTotal}ml`);
    lines.push(`小宝：${smallCount}次 共${smallTotal}ml`);
    lines.push(`合计：${records.length}次 共${bigTotal+smallTotal}ml`);
  }

  lines.push('───────────────────');
  const vitStatus = (t) => { const s = getVitaminStatus(t); return s === 'done' ? '✓' : (s === 'tomorrow' ? '跳过' : '✗'); };
  lines.push(`维生素AD：大宝${vitStatus('ad_big')} · 小宝${vitStatus('ad_small')}`);
  lines.push(`维生素D3：大宝${vitStatus('d3_big')} · 小宝${vitStatus('d3_small')}`);

  const text = lines.join('\n');

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => {
      showToast('已复制！粘贴到微信群即可 ✓', 2500);
    }).catch(() => fallbackCopy(text));
  } else {
    fallbackCopy(text);
  }
}

function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  try {
    document.execCommand('copy');
    showToast('已复制！粘贴到微信群即可 ✓', 2500);
  } catch(e) {
    showToast('复制失败，请手动选择文本');
  }
  document.body.removeChild(ta);
}

// ========== HISTORY ==========
function renderHistory() {
  const records = cachedRecords;
  const diapers = cachedDiaper;
  const today = todayKey();

  const container = document.getElementById('historyList');
  const allDates = Object.keys(records).sort((a,b) => b.localeCompare(a));

  if (allDates.length === 0) {
    container.innerHTML = '<div class="log-empty" style="padding:40px 20px;">暂无历史记录</div>';
    return;
  }

  container.innerHTML = allDates.map(dateKey => {
    const recs = records[dateKey] || [];
    const diaps = diapers[dateKey] || [];
    if (recs.length === 0 && diaps.length === 0) return '';

    const [yr, mo, dy] = dateKey.split('-');
    const isToday = dateKey === today;

    // Stats by baby
    const bigRecs = recs.filter(r => r.baby === 'big');
    const smallRecs = recs.filter(r => r.baby === 'small');
    const bigCount = bigRecs.length;
    const bigTotal = bigRecs.reduce((s,r) => s+r.amount, 0);
    const smallCount = smallRecs.length;
    const smallTotal = smallRecs.reduce((s,r) => s+r.amount, 0);
    const totalAmt = recs.reduce((s,r) => s+r.amount, 0);

    // Merge and sort all entries
    const allEntries = [];
    recs.forEach(r => allEntries.push({ type: 'feed', data: r }));
    diaps.forEach(d => allEntries.push({ type: 'diaper', data: d }));
    allEntries.sort((a, b) => a.data.time - b.data.time);

    const recHTML = allEntries.map(entry => {
      if (entry.type === 'feed') {
        const r = entry.data;
        const who = r.baby === 'big' ? '大宝' : '小宝';
        const dotClass = r.baby === 'big' ? 'dot-big' : 'dot-small';
        const isDirect = r.feed_type === 'direct';
        const typeLabel = r.feed_type === 'breast' ? '[母乳]' : '';
        const noteStr = r.note ? ` · ${r.note}` : '';
        const display = isDirect ? `亲喂${noteStr}` : `${r.amount}ml ${typeLabel}${noteStr}`;
        return `<div class="log-entry">
          <div class="log-dot ${dotClass}"></div>
          <div class="log-time">${fmtTime(r.time)}</div>
          <div class="log-who">${who}</div>
          <div class="log-amount">${display}</div>
        </div>`;
      } else {
        const d = entry.data;
        const who = d.baby === 'big' ? '大宝' : '小宝';
        const dotClass = d.type === 'pee' ? 'dot-pee' : 'dot-poo';
        const typeLabel = d.type === 'pee' ? '小便' : '大便';
        return `<div class="log-entry">
          <div class="log-dot ${dotClass}"></div>
          <div class="log-time">${fmtTime(d.time)}</div>
          <div class="log-who">${who}</div>
          <div class="log-diaper-type">🧷 ${typeLabel}</div>
        </div>`;
      }
    }).join('');

    const monthAbbr = ['','JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
    return `<div class="day-group">
      <div class="day-label-row">
        <div class="day-calendar">
          <div class="day-calendar-month">${monthAbbr[parseInt(mo)]}</div>
          <div class="day-calendar-day">${parseInt(dy)}</div>
        </div>
        <div class="day-label-text">${isToday ? '<span class="today-badge">今天</span>' : ''}${yr}年${parseInt(mo)}月${parseInt(dy)}日</div>
      </div>
      <div class="history-baby-stats">
        <div class="history-baby-stat"><strong>大宝：</strong>${bigCount}次 ${bigTotal}ml</div>
        <div class="history-baby-stat"><strong>小宝：</strong>${smallCount}次 ${smallTotal}ml</div>
        <div class="history-baby-stat">合计：${recs.length}次 ${totalAmt}ml</div>
      </div>
      <div class="log-card">${recHTML}</div>
    </div>`;
  }).join('');
}

// ========== TAB ==========
function switchTab(tab) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
  document.getElementById(`page-${tab}`).classList.add('active');
  document.getElementById(`tab-${tab}`).classList.add('active');
  if (tab === 'history') renderHistory();
}

// ========== NOTIFICATION ==========
function scheduleNotification(baby, lastTs) {
  if (Notification.permission !== 'granted') return;
  const name = baby === 'big' ? '大宝' : '小宝';
  const nextTime = lastTs + INTERVAL_MS;
  const delay = nextTime - Date.now();
  if (delay > 0 && delay < 4 * 60 * 60 * 1000) {
    setTimeout(() => {
      new Notification(`🍼 ${name}该喝奶啦！`, {
        body: `距离上次喂奶已过2.5小时`,
        icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">🍼</text></svg>',
        tag: `feed-${baby}`
      });
    }, delay);
  }
}

// ========== INIT ==========
async function init() {
  // Header date
  const d = new Date();
  const weekdays = ['日','一','二','三','四','五','六'];
  document.getElementById('headerDate').textContent =
    `${d.getMonth()+1}月${d.getDate()}日 · 周${weekdays[d.getDay()]}`;

  // Wait for Supabase SDK
  if (!window.__sb) {
    await new Promise(resolve => {
      window.addEventListener('sb-ready', resolve, { once: true });
    });
  }

  // Load data from Supabase (or cache fallback)
  await loadAllData();

  // Setup realtime sync
  setupRealtime();

  // Init UI
  updateTimer('big');
  updateTimer('small');
  updateVitaminUI();
  renderTodayLog();

  // Tick every second
  setInterval(() => {
    updateTimer('big');
    updateTimer('small');
  }, 1000);

  // Schedule notifications
  ['big', 'small'].forEach(baby => {
    const last = getLastFeed(baby);
    if (last) scheduleNotification(baby, last);
  });
}

init();
